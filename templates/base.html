{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}QuTiP UI{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-row">
            <a class="brand" href="{% url 'home' %}">QuTiP UI Lab</a>
            <nav class="site-nav">
                <a href="{% url 'home' %}">Главная</a>
                <a href="{% url 'system_list' %}">Системы</a>
                <a href="{% url 'editor' %}">Рабочая область</a>
                <a href="{% url 'results' %}">Результаты</a>
                <a href="{% url 'help' %}">Справка</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
